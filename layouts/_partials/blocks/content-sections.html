<section class="relative md:pb-24 pb-16">
  <div class="container relative md:mt-16 mt-16">
    {{ with .Params.title }}
      <div class="grid grid-cols-1 pb-8 text-center">
        <h2 class="mb-4 md:text-4xl md:leading-normal text-3xl leading-normal font-semibold">{{ . }}</h2>
        {{ with $.Params.subtitle }}
          <p class="text-2xl text-slate-500 max-w-4xl mx-auto">{{ . | markdownify }}</p>
        {{ end }}
      </div>
    {{ end }}
    <div class="mx-auto max-w-3xl space-y-12">
      {{ range .Params.items }}
        <article class="scroll-mt-28"{{ with .id }} id="{{ . }}"{{ end }}>
          <h3 class="mb-4 text-2xl font-semibold text-slate-900">{{ .title }}</h3>
          <div class="prose prose-lg max-w-none text-slate-600 prose-headings:text-slate-900 prose-p:text-slate-600 prose-a:text-blue-700 prose-a:font-semibold prose-a:underline hover:prose-a:text-blue-800 hover:prose-a:no-underline">
            {{ .text | markdownify }}
          </div>
        </article>
      {{ end }}
    </div>
  </div>
</section>
